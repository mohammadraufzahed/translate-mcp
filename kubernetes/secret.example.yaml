apiVersion: v1
kind: Secret
metadata:
  name: translate-mcp-secrets
type: Opaque
stringData:
  TRANSLATE_MCP_TOKEN: "your-token"
  OPENAI_API_KEY: "your-openai-key"
  ANTHROPIC_API_KEY: "your-anthropic-key"
  DEEPL_API_KEY: "your-deepl-key"
  DATABASE_DSN: "postgres://mcp:secret@postgres:5432/mcp?sslmode=disable"

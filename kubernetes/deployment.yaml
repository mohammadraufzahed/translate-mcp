apiVersion: apps/v1
kind: Deployment
metadata:
  name: translate-mcp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: translate-mcp
  template:
    metadata:
      labels:
        app: translate-mcp
    spec:
      containers:
        - name: translate-mcp
          image: ghcr.io/mohammadraufzahed/translate-mcp:latest
          ports:
            - containerPort: 8787
          envFrom:
            - secretRef:
                name: translate-mcp-secrets
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
      volumes:
        - name: config
          configMap:
            name: translate-mcp-config
---
apiVersion: v1
kind: Service
metadata:
  name: translate-mcp
spec:
  selector:
    app: translate-mcp
  ports:
    - port: 80
      targetPort: 8787

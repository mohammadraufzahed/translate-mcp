apiVersion: v1
kind: ConfigMap
metadata:
  name: translate-mcp-config
data:
  config.yaml: |
    server:
      transport: http
      host: 0.0.0.0
      port: 8787
      auth:
        type: bearer
        token: ${TRANSLATE_MCP_TOKEN}
    logging:
      format: json
      level: info
    metrics:
      enabled: true
      path: /metrics
    cache:
      default_ttl: 24h
      l1:
        type: memory
        max_entries: 10000
      l3:
        type: postgres
        dsn: ${DATABASE_DSN}
    translation:
      default_provider: openai
      max_text_length: 10000
      max_batch_items: 50
      request_timeout: 60s
      fallback_chain: [openai, deepl, ollama]
      glossary_preprocessing: true

version: 2

project_name: translate-mcp

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: translate-mcp
    main: ./cmd/translate-mcp
    binary: translate-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: translate-mcp
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - config.example.yaml

nfpms:
  - id: translate-mcp
    package_name: translate-mcp
    file_name_template: "{{ .ConventionalFileName }}"
    vendor: "Mohammad Raufzahed"
    homepage: https://github.com/mohammadraufzahed/translate-mcp
    maintainer: "Mohammad Raufzahed <mohammadraufzahed@protonmail.com>"
    description: "A production-grade translation server for the Model Context Protocol."
    license: MIT
    formats:
      - deb
      - rpm
      - apk
      - archlinux
      - termux.deb
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/translate-mcp/LICENSE
      - src: ./README.md
        dst: /usr/share/doc/translate-mcp/README.md
      - src: ./config.example.yaml
        dst: /usr/share/doc/translate-mcp/config.example.yaml
    bindir: /usr/bin

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
